<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 32px 24px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .back-btn {
            font-size: 24px;
            color: #333;
            cursor: default;
            opacity: 0.6;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .label {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
            display: block;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            background: #fafafa;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #d42b2b;
            background: white;
            box-shadow: 0 0 0 3px rgba(212, 43, 43, 0.1);
        }
        .input-group input::placeholder {
            color: #9ca3af;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #d42b2b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
            transition: 0.2s;
        }
        .btn-login:hover {
            background: #b82222;
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .links {
            margin-top: 16px;
            text-align: center;
        }
        .links a {
            color: #1a1a1a;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            margin: 4px 0;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 20px 0 18px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-outline {
            width: 100%;
            padding: 14px;
            background: white;
            color: #1a1a1a;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover {
            background: #f3f4f6;
        }
        .btn-outline:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-create {
            width: 100%;
            padding: 14px;
            background: #d42b2b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: default;
            opacity: 0.7;
            margin-top: 4px;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
        }
        .footer a {
            color: #9ca3af;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .error-box {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            color: #dc2626;
            font-size: 14px;
            display: none;
        }
        .error-box.show {
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header: Tambahkan akun -->
    <div class="header">
        <span class="back-btn">‹</span>
        <h1>Tambahkan akun</h1>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox">
        <span id="errorText">✕ Kata sandi yang Anda masukkan salah.</span>
    </div>

    <!-- Form -->
    <form id="loginForm">
        <div class="input-group">
            <label class="label">Nama Pengguna/Email/Nomor Ponsel</label>
            <input type="text" id="username" placeholder="Nama Pengguna/Email/Nomor Ponsel" required>
        </div>
        <div class="input-group">
            <label class="label">Password</label>
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Log In</button>
    </form>

    <!-- Links -->
    <div class="links">
        <a href="#" id="forgotLink">Lupa Password atau Nama Pengguna?</a>
    </div>

    <hr class="divider">

    <!-- Tombol bawah -->
    <div class="btn-group">
        <button class="btn-outline" id="codeBtn">Kirimi Saya Kode Sekali Pakai</button>
        <button class="btn-outline" id="quickLoginBtn">Log In Cepat</button>
    </div>

    <button class="btn-create" id="createBtn">Buat Akun Baru</button>

    <!-- Footer -->
    <div class="footer">
        <a href="#">Privasi</a> · <a href="#">Syarat</a> · <a href="#">Cookie</a><br>
        <span style="color:#d1d5db;">© 2026 Roblox Corporation</span>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        var errorBox = document.getElementById('errorBox');
        var errorText = document.getElementById('errorText');
        var btn = document.getElementById('loginBtn');

        if (!username || !password) {
            errorText.textContent = '✕ Harap isi semua field.';
            errorBox.classList.add('show');
            return;
        }

        errorBox.classList.remove('show');

        btn.innerHTML = '<span class="spinner"></span> Memproses...';
        btn.disabled = true;

        setTimeout(function() {
            btn.innerHTML = 'Log In';
            btn.disabled = false;

            errorText.textContent = '✕ Kata sandi yang Anda masukkan salah.';
            errorBox.classList.add('show');

            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }, 1500);
    });

    // Lupa password
    document.getElementById('forgotLink').addEventListener('click', function(e) {
        e.preventDefault();
        var errorBox = document.getElementById('errorBox');
        var errorText = document.getElementById('errorText');
        errorText.textContent = '✉️ Link reset telah dikirim ke email Anda.';
        errorBox.classList.add('show');
        setTimeout(function() {
            errorBox.classList.remove('show');
        }, 3000);
    });

    // Kirimi Saya Kode Sekali Pakai
    document.getElementById('codeBtn').addEventListener('click', function() {
        var errorBox = document.getElementById('errorBox');
        var errorText = document.getElementById('errorText');
        errorText.textContent = '📱 Kode verifikasi telah dikirim ke perangkat Anda.';
        errorBox.classList.add('show');
        setTimeout(function() {
            errorBox.classList.remove('show');
        }, 3000);
    });

    // Log In Cepat — mati total
    document.getElementById('quickLoginBtn').addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    // Buat Akun Baru — mati total
    document.getElementById('createBtn').addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    // Hilangin error pas mulai ngetik
    document.getElementById('username').addEventListener('focus', function() {
        document.getElementById('errorBox').classList.remove('show');
    });
    document.getElementById('password').addEventListener('focus', function() {
        document.getElementById('errorBox').classList.remove('show');
    });
</script>

</body>
</html>
