<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #16213e;
            padding: 40px 30px;
            border-radius: 12px;
            width: 380px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            text-align: center;
            border: 1px solid #2a3a5e;
        }
        .logo {
            width: 100px;
            margin-bottom: 20px;
        }
        .logo svg {
            width: 100%;
        }
        h2 {
            color: #fff;
            font-weight: 400;
            font-size: 22px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            color: #b0b9d0;
            font-size: 13px;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 6px;
            background: #1f2a44;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            background: #253155;
            box-shadow: 0 0 0 2px #5d7bb5;
        }
        .input-group input::placeholder {
            color: #6a7a9e;
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: #d42b2b;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: #b82222;
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .links a {
            color: #7d8db5;
            text-decoration: none;
            transition: 0.2s;
        }
        .links a:hover {
            color: #a0b5e0;
            text-decoration: underline;
        }
        .divider {
            border: none;
            border-top: 1px solid #2a3a5e;
            margin: 25px 0 15px;
        }
        .btn-signup {
            background: transparent;
            border: 1px solid #4a5a7e;
            border-radius: 6px;
            color: #fff;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: default;
            width: 100%;
            opacity: 0.6;
            transition: 0.2s;
        }
        .btn-signup:hover {
            background: #1f2a44;
        }
        .footer {
            margin-top: 25px;
            color: #5a6a8e;
            font-size: 11px;
        }
        .footer a {
            color: #7d8db5;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .error-box {
            background: #2a1a1a;
            border-left: 4px solid #d42b2b;
            padding: 10px 12px;
            border-radius: 4px;
            margin-bottom: 15px;
            color: #f0a0a0;
            font-size: 14px;
            text-align: left;
            display: none;
        }
        .error-box.show {
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Logo Roblox (SVG) -->
    <div class="logo">
        <svg viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <text x="0" y="45" font-family="Arial Black, Arial" font-size="48" font-weight="900" fill="#d42b2b">ROBLOX</text>
        </svg>
    </div>

    <h2>Masuk ke akun Anda</h2>

    <div class="error-box" id="errorBox">
        <span id="errorText">✕ Kata sandi yang Anda masukkan salah.</span>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label>Username / Email</label>
            <input type="text" id="username" placeholder="Masukkan username atau email" required>
        </div>
        <div class="input-group">
            <label>Kata sandi</label>
            <input type="password" id="password" placeholder="Masukkan kata sandi" required>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Masuk</button>
    </form>

    <div class="links">
        <a href="#" id="forgotLink">Lupa kata sandi?</a>
        <a href="#">Daftar</a>
    </div>

    <hr class="divider">

    <button class="btn-signup" id="signupBtn">Buat akun baru</button>

    <div class="footer">
        <a href="#">Privasi</a> · <a href="#">Syarat</a> · <a href="#">Cookie</a><br>
        <span style="color:#4a5a7e;">© 2026 Roblox Corporation</span>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        var errorBox = document.getElementById('errorBox');
        var errorText = document.getElementById('errorText');
        var btn = document.getElementById('loginBtn');

        if (!username || !password) {
            errorText.textContent = '✕ Harap isi username dan kata sandi.';
            errorBox.classList.add('show');
            return;
        }

        errorBox.classList.remove('show');

        // Simulasi loading
        btn.innerHTML = '<span class="spinner"></span> Memproses...';
        btn.disabled = true;

        setTimeout(function() {
            // Ini cuma simulasi — data tidak dikirim ke mana pun
            btn.innerHTML = 'Masuk';
            btn.disabled = false;

            errorText.textContent = '✕ Kata sandi yang Anda masukkan salah.';
            errorBox.classList.add('show');

            // Reset form (optional biar mirip)
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';

            // Fokus ke password
            document.getElementById('password').focus();
        }, 1500);
    });

    // Tombol "Lupa kata sandi?" — muncul notif palsu
    document.getElementById('forgotLink').addEventListener('click', function(e) {
        e.preventDefault();
        var errorBox = document.getElementById('errorBox');
        var errorText = document.getElementById('errorText');
        errorText.textContent = '✉️ Link reset kata sandi telah dikirim ke email Anda.';
        errorBox.classList.add('show');
        setTimeout(function() {
            errorBox.classList.remove('show');
        }, 3000);
    });

    // Tombol "Buat akun baru" — mati total
    document.getElementById('signupBtn').addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
    });

    // Hilangin error pas mulai ngetik
    document.getElementById('username').addEventListener('focus', function() {
        document.getElementById('errorBox').classList.remove('show');
    });
    document.getElementById('password').addEventListener('focus', function() {
        document.getElementById('errorBox').classList.remove('show');
    });
</script>

</body>
</html>
